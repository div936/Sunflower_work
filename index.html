<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Nidhi 🌻</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }

        /* The rolling grass hill */
        .garden {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(to bottom, #7CFC00 0%, #228B22 100%);
            border-top-left-radius: 50% 20%;
            border-top-right-radius: 50% 20%;
        }

        /* Sunflowers */
        .sunflower {
            position: absolute;
            bottom: 5%;
            transform-origin: bottom center;
            animation: sway 4s infinite alternate ease-in-out;
            user-select: none;
        }

        /* Butterflies */
        .butterfly {
            position: absolute;
            user-select: none;
            animation: flutter 6s infinite alternate ease-in-out;
        }

        /* Airplane and Banner Setup */
        .plane-container {
            position: absolute;
            top: 20%;
            left: -800px; /* Starts off-screen to the left */
            display: flex;
            align-items: center;
            animation: flyAcross 15s linear forwards;
            animation-delay: 2s; /* Waits 2 seconds before flying in */
            z-index: 10;
        }

        /* Rotate the airplane emoji so it flies forward */
        .plane {
            font-size: 60px;
            transform: rotate(90deg);
        }

        /* The custom sky banner */
        .banner {
            background: white;
            padding: 15px 30px;
            border-radius: 5px;
            margin-left: 15px;
            font-size: 28px;
            color: #d32f2f;
            font-weight: bold;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.1);
            position: relative;
            white-space: nowrap;
        }

        /* The rope connecting the plane to the banner */
        .banner::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 50%;
            width: 20px;
            height: 3px;
            background: #555;
        }

        /* Animations */
        @keyframes sway {
            0% { transform: rotate(-8deg); }
            100% { transform: rotate(8deg); }
        }

        @keyframes flutter {
            0% { transform: translate(0, 0) rotate(-10deg); }
            33% { transform: translate(30px, -40px) rotate(15deg); }
            66% { transform: translate(-20px, -60px) rotate(-5deg); }
            100% { transform: translate(40px, 20px) rotate(10deg); }
        }

        @keyframes flyAcross {
            0% { left: -800px; top: 30%; }
            50% { top: 15%; }
            100% { left: 110vw; top: 25%; }
        }
    </style>
</head>
<body>

    <div class="garden"></div>
    
    <!-- The Airplane & Message -->
    <div class="plane-container">
        <div class="plane">🛩️</div>
        <div class="banner">Nidhi, You are the best!!! ❤️</div>
    </div>

    <!-- JavaScript to generate the garden dynamically -->
    <script>
        // Plant the Sunflowers
        const numSunflowers = 35;
        for(let i = 0; i < numSunflowers; i++) {
            let sf = document.createElement('div');
            sf.className = 'sunflower';
            sf.innerText = '🌻';
            // Random horizontal placement
            sf.style.left = (Math.random() * 95) + 'vw';
            // Random sizes to create depth
            sf.style.fontSize = (40 + Math.random() * 40) + 'px';
            // Randomize the sway timing so they don't move like robots
            sf.style.animationDelay = (Math.random() * 3) + 's';
            sf.style.animationDuration = (3 + Math.random() * 2) + 's';
            // Randomize height slightly along the grass
            sf.style.bottom = (Math.random() * 25) + 'vh';
            
            document.body.appendChild(sf);
        }

        // Release the Butterflies
        const numButterflies = 12;
        for(let i = 0; i < numButterflies; i++) {
            let bf = document.createElement('div');
            bf.className = 'butterfly';
            bf.innerText = '🦋';
            bf.style.left = (Math.random() * 90) + 'vw';
            bf.style.top = (30 + Math.random() * 40) + 'vh';
            bf.style.fontSize = (20 + Math.random() * 15) + 'px';
            bf.style.animationDelay = (Math.random() * 5) + 's';
            
            document.body.appendChild(bf);
        }
    </script>
</body>
</html>
