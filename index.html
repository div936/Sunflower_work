<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Walk With You</title>
    <style>
        /* Reset and layout */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Georgia', serif;
        }

        /* Elegant starting screen */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            transition: opacity 2s ease;
        }

        h2 {
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 35px;
            font-size: 16px;
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.4s ease;
            letter-spacing: 1px;
        }

        button:hover {
            background: white;
            color: black;
            border-color: white;
        }

        /* The full-screen background video container */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            opacity: 0;
            transition: opacity 2s ease;
        }

        /* Forces the video to cover the entire screen smoothly without stretching */
        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .show-video {
            opacity: 1;
        }

        /* Proposal Text moved to the bottom so it doesn't block the skywriting */
        .message {
            position: absolute;
            bottom: 15%; 
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 2.5rem;
            text-align: center;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.9);
            opacity: 0;
            pointer-events: none;
            letter-spacing: 1px;
            width: 90%; 
            z-index: 10;
        }

        .show-message {
            animation: fadeInOut 10s ease-in-out forwards;
            animation-delay: 4s; /* Waits 4 seconds into the video walk before appearing */
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            20% { opacity: 1; transform: translate(-50%, 0); }
            80% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -20px); }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2>For Nidhi</h2>
        <button onclick="startWalk()">Take my hand</button>
    </div>

    <div class="video-container" id="video-box">
        <video id="bg-video" playsinline>
            <source src="sunflower_walk.mp4" type="video/mp4">
        </video>
        <div class="message" id="msg">Will you walk with me forever?</div>
    </div>

    <script>
        function startWalk() {
            // Fade out the start screen
            const startScreen = document.getElementById('start-screen');
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
            }, 2000);

            // Show and play the video walk-through
            const videoBox = document.getElementById('video-box');
            const video = document.getElementById('bg-video');
            const msg = document.getElementById('msg');
            
            videoBox.classList.add('show-video');
            msg.classList.add('show-message');
            
            // Start playing the video file
            video.play();
        }
    </script>
</body>
</html>
