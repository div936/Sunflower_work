<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Walk With You</title>
    <style>
        /* Reset and layout */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Georgia', serif;
        }

        /* An elegant starting screen to set the mood */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            transition: opacity 2.5s ease;
        }

        h2 {
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 35px;
            font-size: 16px;
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.4s ease;
            letter-spacing: 1px;
        }

        button:hover {
            background: white;
            color: black;
            border-color: white;
        }

        /* The main scene setup */
        .scene-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* The realistic image setup */
        .background-image {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Make sure the filename matches what you upload exactly */
            background-image: url('watermarked_img_5130332706140299966.png'); 
            background-size: cover;
            background-position: center center;
            /* This is the magic part: It centers the zoom specifically on the dirt path */
            transform-origin: 50% 75%; 
            opacity: 0;
        }

        /* The walking animation */
        .walk-animation {
            /* 25 seconds for a very slow, romantic walk forward */
            animation: walkIn 25s cubic-bezier(0.35, 0.45, 0.45, 0.95) forwards;
            opacity: 1;
        }

        @keyframes walkIn {
            0% {
                transform: scale(1);
                filter: brightness(0.2); /* Starts dark like opening eyes */
            }
            15% {
                filter: brightness(1.1); /* Brightens up like morning */
            }
            100% {
                transform: scale(1.8); /* Zooms in heavily to simulate walking down the path */
                filter: brightness(1);
            }
        }

        /* Proposal Text that fades in midway */
        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 2.5rem;
            text-align: center;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.8);
            opacity: 0;
            pointer-events: none;
            letter-spacing: 1px;
        }

        .show-message {
            animation: fadeInOut 12s ease-in-out forwards;
            animation-delay: 10s; /* Waits 10 seconds into the walk before showing */
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -40%); }
            20% { opacity: 1; transform: translate(-50%, -50%); }
            80% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -60%); }
        }
    </style>
</head>
<body>

    <!-- Start Screen -->
    <div id="start-screen">
        <h2>For Nidhi</h2>
        <button onclick="startWalk()">Take my hand</button>
    </div>

    <!-- The Scene -->
    <div class="scene-container">
        <div class="background-image" id="bg-img"></div>
        <div class="message" id="msg">Will you walk with me forever?</div>
    </div>

    <!-- JavaScript to trigger the walk when she clicks the button -->
    <script>
        function startWalk() {
            // Fade out the start screen
            const startScreen = document.getElementById('start-screen');
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
            }, 2500);

            // Trigger the walk-through animations
            const bgImg = document.getElementById('bg-img');
            const msg = document.getElementById('msg');
            
            bgImg.classList.add('walk-animation');
            msg.classList.add('show-message');
        }
    </script>
</body>
</html>
